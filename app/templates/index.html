<!DOCTYPE html>
<html>
<head>
    <title>QuizGen AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">QuizGen AI</h1>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post" enctype="multipart/form-data" class="card p-4">
        <div class="mb-3">
            <label class="form-label">Upload Document (pdf, audio, video)</label>
            <input class="form-control" type="file" name="document" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Plan</label>
            <select class="form-select" name="plan" id="plan" onchange="toggleDifficulty()">
                <option value="free">Free</option>
                <option value="pro">Pro</option>
                <option value="premium">Premium</option>
            </select>
        </div>
        <div class="mb-3" id="difficulty-group" style="display:none;">
            <label class="form-label">Difficulty</label>
            <select class="form-select" name="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <button class="btn btn-primary" type="submit">Generate Quiz</button>
    </form>
</div>
<script>
function toggleDifficulty() {
    var plan = document.getElementById('plan').value;
    var group = document.getElementById('difficulty-group');
    group.style.display = (plan === 'pro' || plan === 'premium') ? 'block' : 'none';
}
toggleDifficulty();
</script>
</body>
</html>
