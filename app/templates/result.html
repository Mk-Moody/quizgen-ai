<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">Results</h1>
    <p class="lead">Score: {{ score }} / {{ total }}</p>
    {% for r in results %}
    <div class="card mb-3 p-3">
        <strong>{{ loop.index }}. {{ r.question }}</strong>
        <ul class="list-group list-group-flush">
            {% for option in r.options %}
            <li class="list-group-item {% if option == r.answer %}list-group-item-success{% elif option == r.user %}list-group-item-danger{% endif %}">{{ option }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endfor %}
    <a href="{{ url_for('index') }}" class="btn btn-primary">Start Over</a>
</div>
</body>
</html>
