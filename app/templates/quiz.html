<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="text-center mb-4">Quiz</h1>
    <form method="post" action="{{ url_for('submit') }}">
        {% for q in questions %}
        <div class="card mb-3 p-3">
            <strong>{{ loop.index }}. {{ q.question }}</strong>
            {% for option in q.options %}
            <div class="form-check">
                <input class="form-check-input" type="radio" name="q{{ loop.parent.index0 }}" id="q{{ loop.parent.index0 }}{{ loop.index }}" value="{{ ['A','B','C','D'][loop.index0] }}" required>
                <label class="form-check-label" for="q{{ loop.parent.index0 }}{{ loop.index }}">{{ option }}</label>
            </div>
            {% endfor %}
        </div>
        {% endfor %}
        <button class="btn btn-success" type="submit">Submit Answers</button>
    </form>
</div>
</body>
</html>
